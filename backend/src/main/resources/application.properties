spring.application.name=backend

server.port=${SERVER_PORT:8080}

# Database Configuration (Purely from .env)

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

spring.datasource.username=${DB_USER}

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver



# Flyway (backend 기동 시 스키마 자동 migration)

spring.flyway.enabled=true

spring.flyway.locations=classpath:db/migration

spring.flyway.postgresql.transactional.lock=false



# JPA/Hibernate — Flyway가 스키마를 만든 뒤 Entity 매핑만 검증

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



# Redis (rate limiting)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms



# Reverse proxy (Nginx) client IP / scheme

server.forward-headers-strategy=framework



# JWT Security Settings

jwt.secret=${JWT_SECRET}

jwt.expiration=${JWT_EXPIRATION_MS:1800000}

jwt.cookie.name=ADMIN_TOKEN
jwt.cookie.path=/api
jwt.cookie.secure=${JWT_COOKIE_SECURE:true}

jwt.cookie.same-site=Strict



# Login brute-force protection

app.security.login.max-failures=${LOGIN_MAX_FAILURES:5}

app.security.login.lockout-minutes=${LOGIN_LOCKOUT_MINUTES:15}

app.security.login.max-requests-per-minute=${LOGIN_MAX_REQUESTS_PER_MINUTE:10}



# Public analytics API rate limits (complements Nginx edge limits)

app.security.analytics.max-general-requests-per-minute=${ANALYTICS_MAX_GENERAL_REQUESTS_PER_MINUTE:60}

app.security.analytics.max-explorer-requests-per-minute=${ANALYTICS_MAX_EXPLORER_REQUESTS_PER_MINUTE:30}

app.security.analytics.max-detail-requests-per-minute=${ANALYTICS_MAX_DETAIL_REQUESTS_PER_MINUTE:30}

app.security.analytics.cache-max-age-seconds=${ANALYTICS_CACHE_MAX_AGE_SECONDS:120}



# Trusted reverse proxies for client IP (nginx X-Real-IP or ALB X-Forwarded-For).
# ECS Terraform sets this to the VPC CIDR automatically.
app.security.trusted-proxy.cidrs=${TRUSTED_PROXY_CIDRS:}



# JWT revocation denylist pruning

app.security.jwt.revocation-prune-interval-ms=${JWT_REVOCATION_PRUNE_INTERVAL_MS:3600000}



# Public explorer API limits

app.explorer.max-page-size=${EXPLORER_MAX_PAGE_SIZE:100}

app.explorer.max-search-length=${EXPLORER_MAX_SEARCH_LENGTH:200}

app.explorer.max-filter-tokens=${EXPLORER_MAX_FILTER_TOKENS:20}

app.explorer.max-filter-token-length=${EXPLORER_MAX_FILTER_TOKEN_LENGTH:100}



# Actuator — Docker/K8s health probes (backend port not exposed on host)

management.endpoints.web.exposure.include=health

management.endpoint.health.show-details=never

management.endpoint.health.probes.enabled=true



# Pipeline job liveness (worker heartbeat + stale recovery)
pipeline.jobs.stale-minutes=${PIPELINE_JOB_STALE_MINUTES:10}

# Pipeline staging baselines (host ./data mounted at /data in Docker)
pipeline.staging.data-root=${PIPELINE_DATA_ROOT:/data}
