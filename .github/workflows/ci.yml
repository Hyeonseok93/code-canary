name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use runner JDK (ignore Windows-only gradle.properties)
        run: sed -i '/^org.gradle.java.home=/d' gradle.properties || true

      - name: Test
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

  frontend:
    name: Frontend
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  worker:
    name: Worker
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest
