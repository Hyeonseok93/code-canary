# Local development stack only — CI/CD uses ECS + Terraform (see infra/).
# Run from repo root: local/docker-up.cmd  or  local/docker-up.sh

services:
  db:
    image: postgres:15-alpine@sha256:df7bca0066e6f60cc3dd32faa70caddec20e2c22b58932f79498e5704b23854a
    container_name: codecanary-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: "256mb"
    networks:
      - db-net
    secrets:
      - db_password
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: codecanary-redis
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        exec redis-server --save "" --appendonly no --requirepass "$$(cat /run/secrets/redis_password)"
    networks:
      - redis-net
    secrets:
      - redis_password
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: codecanary-backend
    env_file:
      - ../.env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      PIPELINE_DATA_ROOT: ${PIPELINE_DATA_ROOT:-/data}
      SERVER_PORT: ${SERVER_PORT:-8080}
      PIPELINE_JOB_STALE_MINUTES: ${PIPELINE_JOB_STALE_MINUTES:-10}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-172.28.0.0/24}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend-net
      - db-net
      - redis-net
    secrets:
      - db_password
      - jwt_secret
      - redis_password
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ../data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${SERVER_PORT:-8080}/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: codecanary-worker
    env_file:
      - ../.env
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      PIPELINE_DATA_ROOT: ${PIPELINE_DATA_ROOT:-/data}
      NVD_API_URL: ${NVD_API_URL:-https://services.nvd.nist.gov/rest/json/cves/2.0}
      OSV_API_URL: ${OSV_API_URL:-https://osv-vulnerabilities.storage.googleapis.com/all.zip}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-5}
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-60}
      WORKER_JOB_STALE_MINUTES: ${WORKER_JOB_STALE_MINUTES:-10}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - db-net
    secrets:
      - db_password
    read_only: true
    tmpfs:
      - /tmp:uid=10001,gid=10001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ../data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: codecanary-frontend
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  frontend-net:
    ipam:
      config:
        - subnet: 172.28.0.0/24
  db-net:
  redis-net:

secrets:
  db_password:
    file: .docker-secrets/db_password
  jwt_secret:
    file: .docker-secrets/jwt_secret
  redis_password:
    file: .docker-secrets/redis_password

volumes:
  pgdata:
