worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile        on;
    keepalive_timeout  65;

    # Edge rate limits (per client IP) — complements backend rate limiters
    limit_req_zone $binary_remote_addr zone=auth_login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=analytics_api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=analytics_explorer:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=analytics_detail:10m rate=30r/m;
    limit_req_status 429;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen       8080;
        server_name  localhost;

        # Security headers (HSTS enabled at runtime when NGINX_HSTS_ENABLED=true)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # HSTS_INSERT
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-elem 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

        # Serve static React built files
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # ---------------------------------------------------------------------
        # Production IP allowlist (recommended)
        #
        # Restrict the operator console and admin APIs to trusted office/VPN IPs.
        # Paths must match root .env (VITE_ADMIN_BASE, VITE_ADMIN_HATCH, VITE_ADMIN_FORAGE):
        #   {base}           Control Plane SPA
        #   {base}/hatch     operator login
        #   {base}/forage    pipeline activity monitor
        #   /api/auth/login  authentication
        #   /api/admin/*     pipeline control APIs
        #
        # Example (replace 203.0.113.0/24 with your CIDR; uncomment and adjust base):
        #
        # geo $operator_allow {
        #     default 0;
        #     203.0.113.0/24 1;
        # }
        #
        # location ^~ /roost {
        #     if ($operator_allow = 0) { return 403; }
        #     root /usr/share/nginx/html;
        #     try_files $uri $uri/ /index.html;
        # }
        #
        # location = /api/auth/login {
        #     if ($operator_allow = 0) { return 403; }
        #     ...
        # }
        #
        # location ^~ /api/admin/ {
        #     if ($operator_allow = 0) { return 403; }
        #     ...
        # }
        # ---------------------------------------------------------------------

        # Reverse Proxy /api — stricter limits on sensitive/public-heavy paths first
        location = /api/auth/login {
            limit_req zone=auth_login burst=5 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/analytics/explorer/[^/]+$ {
            limit_req zone=analytics_detail burst=10 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/analytics/explorer {
            limit_req zone=analytics_explorer burst=15 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/analytics/ {
            limit_req zone=analytics_api burst=30 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
